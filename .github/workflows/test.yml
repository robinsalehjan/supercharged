name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run twice a week: Sunday and Thursday at 9 AM UTC
    - cron: '0 9 * * 0'
    - cron: '0 9 * * 4'

jobs:
  test:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        brew install bats-core jq shellcheck
        npm install

    - name: Run shellcheck
      run: npm run lint

    - name: Run BATS tests
      run: npm test

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: |
          tests/**/*.log
          *.log
