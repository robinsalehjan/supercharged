name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag matches package.json
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_REF" != "v$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_REF does not match package.json version v$PKG_VERSION"
            exit 1
          fi
          echo "Tag $TAG_REF matches package.json v$PKG_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.4.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
