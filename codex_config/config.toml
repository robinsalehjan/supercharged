model = "gpt-5.6-sol"
model_reasoning_effort = "high"
personality = "pragmatic"
web_search = "cached"
project_doc_fallback_filenames = ["CLAUDE.md"]
project_doc_max_bytes = 65536
default_permissions = "supercharged"

[features]
shell_snapshot = true
hooks = true

[permissions.supercharged]
extends = ":workspace"

[permissions.supercharged.filesystem.":workspace_roots"]
"**/.env*" = "deny"
"**/.secrets" = "deny"
"**/.secrets/**" = "deny"

[mcp_servers.code-review-graph]
command = "code-review-graph"
args = ["serve"]

[mcp_servers.code-review-graph.tools.get_review_context_tool]
approval_mode = "approve"

[mcp_servers.code-review-graph.tools.list_repos_tool]
approval_mode = "approve"

[mcp_servers.code-review-graph.tools.query_graph_tool]
approval_mode = "approve"

[mcp_servers.code-review-graph.tools.refactor_tool]
approval_mode = "approve"

[mcp_servers.code-review-graph.tools.semantic_search_nodes_tool]
approval_mode = "approve"

[mcp_servers.XcodeBuildMCP]
command = "xcodebuildmcp"
args = ["mcp"]

[mcp_servers.cupertino]
command = "cupertino"
args = ["serve", "--no-reap"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.computer-use]
command = "./Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient"
args = ["mcp"]
cwd = "."
enabled = false

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "branch-changes", "context-remaining"]
status_line_use_colors = true
